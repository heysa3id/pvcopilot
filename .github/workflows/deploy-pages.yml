# Deploy Vite build to GitHub Pages.
# Repo Settings → Pages → Source must be "GitHub Actions" (not "Deploy from a branch").
# Site: https://www.pvcopilot.com/
#
# Production API (required for contact form, Quality Check CSV, LCOE PDF parser on the live site):
# Settings → Secrets and variables → Actions → New repository secret:
#   VITE_API_BASE      — https origin of your Flask app, no trailing slash
#   VITE_PARSER_URL    — optional, full URL e.g. https://your-api.example.com/api/parse-pvsyst
# If unset, the client falls back to localhost (fine for local builds only).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
          VITE_PARSER_URL: ${{ secrets.VITE_PARSER_URL }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
